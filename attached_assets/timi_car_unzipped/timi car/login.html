<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login | European Prestige</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .login-container {
            background: #0a0a0a;
            border: 1px solid #c5a059;
            border-radius: 8px;
            padding: 50px;
            width: 100%;
            max-width: 400px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 4px;
            font-weight: 300;
            font-size: 1.3rem;
            color: #fff;
        }

        .login-container input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #111;
            border: 1px solid #333;
            color: #fff;
            outline: none;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .login-container input:focus {
            border-color: #c5a059;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
        }

        .login-container button {
            width: 100%;
            background: #c5a059;
            padding: 12px;
            border: none;
            cursor: pointer;
            border-radius: 4px;
            color: #000;
            font-weight: 700;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .login-container button:hover {
            background: #e2bd7d;
            transform: translateY(-2px);
        }

        #error {
            color: #ff4d4d;
            display: none;
            margin-top: 15px;
            text-align: center;
            font-size: 0.85rem;
            animation: shake 0.3s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .login-footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>STAFF LOGIN</h2>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">ENTER DASHBOARD</button>
            <p id="error">Invalid Credentials</p>
        </form>
    </div>

    <div class="login-footer">
        <p>European Prestige | Admin Portal</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error');
            
            if(document.getElementById('username').value === "ADMINONLY" && 
               document.getElementById('password').value === "admin123") {
                sessionStorage.setItem('auth', 'true');
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
