<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Collection | European Prestige</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Extra styles for the Gallery Popup */
        .gallery-modal {
            display: none;
            position: fixed;
            z-index: 3000;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .gallery-content { 
            position: relative; 
            width: 90%; 
            max-width: 1000px;
            animation: gallerySlideIn 0.3s ease-out;
        }
        
        @keyframes gallerySlideIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .gallery-img { 
            width: 100%; 
            height: auto; 
            max-height: 80vh;
            object-fit: contain;
            border: 1px solid var(--gold);
            border-radius: 4px;
        }
        
        .close-gallery { 
            position: absolute; 
            top: -45px; 
            right: 0; 
            color: white; 
            cursor: pointer; 
            font-size: 2.5rem;
            transition: 0.3s;
            font-weight: 300;
        }
        
        .close-gallery:hover {
            color: var(--gold);
        }
        
        .nav-btn { 
            background: var(--gold); 
            border: none; 
            padding: 12px 25px; 
            cursor: pointer; 
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        
        .nav-btn:hover {
            background: var(--gold-hover);
        }
        
        .gallery-counter {
            color: var(--gold);
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        
        /* Mobile improvements */
        @media (max-width: 768px) {
            .section-header h2 {
                font-size: 1rem;
            }
            
            .car-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">EUROPEAN<span>PRESTIGE</span></a>
            
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="inventory.html" style="color:var(--gold)">All Stock</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <section class="inventory-section">
        <div class="section-header">
            <h2>FULL COLLECTION</h2>
        </div>
        <div class="car-grid" id="fullInventoryGrid">
            </div>
    </section>

    <div id="galleryModal" class="gallery-modal">
        <div class="gallery-content">
            <span class="close-gallery" onclick="closeGallery()">&times;</span>
            <img id="activeGalleryImg" src="" class="gallery-img" onerror="this.src='https://via.placeholder.com/500x300?text=Image+Error'">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 25px; gap: 15px;">
                <button class="nav-btn" onclick="changeImg(-1)">← PREV</button>
                <span id="galleryCounter" class="gallery-counter">1 / 1</span>
                <button class="nav-btn" onclick="changeImg(1)">NEXT →</button>
            </div>
        </div>
    </div>

    <script>
        // --- Mobile Menu Logic ---
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.querySelector('.nav-links');

        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
        }

        let currentCarImages = [];
        let currentIndex = 0;

        async function loadInventory() {
            const grid = document.getElementById('fullInventoryGrid');
            try {
                const res = await fetch('http://localhost:5000/api/cars');
                const cars = await res.json();
                
                if (cars.length === 0) {
                    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:#666;">
                        <p style="font-size:1.1rem; letter-spacing:2px;">NO VEHICLES IN STOCK</p>
                    </div>`;
                    return;
                }
                
                grid.innerHTML = cars.map(car => {
                    // Ensure images array exists and has valid images
                    const images = (car.images && Array.isArray(car.images) && car.images.length > 0) 
                        ? car.images 
                        : ['https://via.placeholder.com/500x300?text=No+Image'];
                    
                    const firstImage = images[0];
                    
                    return `
                        <div class="car-card">
                            <img src="${firstImage}" 
                                 alt="${car.title}" 
                                 onerror="this.src='https://via.placeholder.com/500x300?text=Image+Error'"
                                 style="cursor:pointer;"
                                 onclick="openGallery(${JSON.stringify(images).replace(/"/g, '&quot;')})">
                            <div class="car-info-compact" style="padding:20px;">
                                <h3 style="margin-bottom:8px;">${car.title}</h3>
                                <p style="font-size:0.75rem; color:#888; margin-bottom:12px; line-height:1.5;">
                                    ${car.details ? car.details.substring(0, 80) + (car.details.length > 80 ? '...' : '') : 'Luxury vehicle'}
                                </p>
                                <p class="price">£${Number(car.price).toLocaleString()}</p>
                                <div style="display:flex; gap:8px; margin-top:15px; flex-wrap:wrap;">
                                    <button onclick="openGallery(${JSON.stringify(images).replace(/"/g, '&quot;')})" 
                                            style="flex:1; minwidth:120px; background:transparent; border:1px solid #444; color:white; padding:10px; cursor:pointer; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; border-radius:4px; transition:0.3s; font-weight:600;"
                                            onmouseover="this.style.background='rgba(197,160,89,0.1)'; this.style.borderColor='var(--gold)';"
                                            onmouseout="this.style.background='transparent'; this.style.borderColor='#444';">
                                        VIEW ${images.length} PHOTO${images.length !== 1 ? 'S' : ''}
                                    </button>
                                    <a href="https://wa.me/YOUR_NUMBER?text=Hi%20I%27m%20interested%20in%20the%20${encodeURIComponent(car.title)}" 
                                       target="_blank"
                                       style="flex:1; minwidth:120px; background:#25D366; color:white; text-align:center; padding:10px; text-decoration:none; font-size:0.7rem; text-transform:uppercase; letter-spacing:1px; border-radius:4px; font-weight:600; transition:0.3s;"
                                       onmouseover="this.style.background='#20BA5C';"
                                       onmouseout="this.style.background='#25D366';">
                                        WHATSAPP
                                    </a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Error loading inventory:", err);
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px; color:#ff4d4d;">
                    <p style="font-size:1.1rem; letter-spacing:2px;">CONNECTION ERROR</p>
                    <p style="color:#888; margin-top:10px;">Unable to load vehicles. Check server connection.</p>
                </div>`;
            }
        }

        function openGallery(images) {
            // Filter out invalid images
            currentCarImages = images.filter(img => img && typeof img === 'string');
            if (currentCarImages.length === 0) {
                currentCarImages = ['https://via.placeholder.com/500x300?text=No+Image'];
            }
            currentIndex = 0;
            updateGalleryImage();
            document.getElementById('galleryModal').style.display = 'flex';
        }

        function closeGallery() {
            document.getElementById('galleryModal').style.display = 'none';
        }

        function updateGalleryImage() {
            document.getElementById('activeGalleryImg').src = currentCarImages[currentIndex];
            document.getElementById('galleryCounter').innerText = `${currentIndex + 1} / ${currentCarImages.length}`;
        }

        function changeImg(step) {
            currentIndex += step;
            if (currentIndex >= currentCarImages.length) currentIndex = 0;
            if (currentIndex < 0) currentIndex = currentCarImages.length - 1;
            updateGalleryImage();
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const modal = document.getElementById('galleryModal');
            if (modal.style.display === 'flex') {
                if (e.key === 'ArrowLeft') changeImg(-1);
                if (e.key === 'ArrowRight') changeImg(1);
                if (e.key === 'Escape') closeGallery();
            }
        });

        loadInventory();
        
        // Listen for cross-tab inventory updates
        window.addEventListener('storage', (e) => {
            if (e.key === 'inventory_update') loadInventory();
        });

        // Periodic polling to keep inventory fresh (60 seconds for better performance)
        setInterval(loadInventory, 60000);
    </script>
</body>
</html>
